<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шұғыла анамыздың 50 жас мерейтойы</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    
    <style>
        body {
            /* Pinterest стиліндегі гүлді фон */
            background-image: url('https://i.pinimg.com/originals/32/7b/95/327b9525f3898869c9b910e9f0238e74.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .invitation-card {
            background: rgba(255, 255, 255, 0.97);
            max-width: 480px;
            width: 100%;
            padding: 50px 35px;
            text-align: center;
            border: 2px solid #d4af37;
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            border-radius: 5px;
        }

        .script-font {
            font-family: 'Great Vibes', cursive;
            color: #b8860b;
            font-size: 60px;
            margin: 5px 0;
        }

        .main-font {
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 12px;
            color: #666;
            margin-bottom: 15px;
        }

        .title-50 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            color: #1a2a6c;
            font-style: italic;
            margin-bottom: 25px;
        }

        .divider {
            width: 40%;
            height: 1px;
            background: #d4af37;
            margin: 20px auto;
        }

        .intro-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 15px;
            line-height: 1.8;
            color: #333;
            margin-bottom: 25px;
        }

        /* Күнтізбе стилі */
        .calendar-table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            margin: 20px 0;
        }

        .calendar-table th { color: #b8860b; padding-bottom: 10px; }
        .calendar-table td { padding: 8px 0; }

        .highlight {
            background-color: #b8860b;
            color: white;
            border-radius: 50%;
            display: inline-block;
            width: 30px;
            height: 30px;
            line-height: 30px;
            font-weight: 600;
        }

        .time-box {
            font-family: 'Montserrat', sans-serif;
            font-size: 18px;
            letter-spacing: 5px;
            color: #1a2a6c;
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
            padding: 10px 0;
            margin: 20px 0;
        }

        .location-box strong {
            display: block;
            font-size: 20px;
            color: #1a2a6c;
            font-family: 'Montserrat', sans-serif;
        }

        .rsvp-section {
            background: #fdfaf5;
            padding: 25px;
            border-radius: 4px;
            margin-top: 30px;
        }

        .submit-btn {
            background: #1a2a6c;
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            transition: 0.3s;
        }

        .submit-btn:hover {
            background: #b8860b;
        }

        .closing-text {
            font-family: 'Great Vibes', cursive;
            font-size: 34px;
            color: #1a2a6c;
            margin-top: 35px;
            line-height: 1.1;
        }

        .family-footer {
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 15px;
            margin-top: 20px;
            color: #b8860b;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="invitation-card">
    <p class="main-font">Тойға шақыру</p>
    <div class="script-font">Шұғыла</div>
    <p class="title-50">50 жас мерейтойы</p>

    <div class="divider"></div>

    <p class="intro-text">
        Ақ тілекпен, ақ ниетпен арнайы шақырамыз!<br>
        Ардақты анамыздың ақ дастарханынан дәм татып, қуанышына ортақ болыңыздар.
    </p>

    <div class="calendar-section">
        <table class="calendar-table">
            <thead>
                <tr>
