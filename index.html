<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<title>Шуғыланың 50 жас мерейтойы</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Cinzel', serif;
background:linear-gradient(180deg,#fff7e6,#f6e2b3);
text-align:center;
color:#6b4c1e;
}

.container{
width:800px;
margin:auto;
padding:40px;
background:white;
border:6px solid gold;
border-radius:20px;
box-shadow:0 0 40px rgba(0,0,0,0.2);
}

.title{
font-size:28px;
letter-spacing:2px;
margin-bottom:10px;
}

.name{
font-family:'Great Vibes', cursive;
font-size:80px;
color:#c89b3c;
margin:10px 0;
}

.subtitle{
font-size:20px;
margin-bottom:30px;
}

.section{
background:#fffaf0;
padding:30px;
border-radius:15px;
border:2px solid gold;
}

.section h2{
font-size:30px;
margin-bottom:20px;
}

.info{
font-size:18px;
margin:10px 0;
}

.button{
display:inline-block;
padding:12px 30px;
margin:15px;
border-radius:30px;
border:none;
background:linear-gradient(90deg,#d4af37,#f6d77b);
color:white;
font-size:18px;
cursor:pointer;
}

.button2{
background:linear-gradient(90deg,#b68a2e,#e0b04f);
}

.footer{
margin-top:40px;
font-family:'Great Vibes', cursive;
font-size:30px;
color:#b08a3a;
}

</style>
</head>

<body>

<div class="container">

<div class="title">Мерейтой 50 жас</div>

<div class="name">Шуғыла</div>

<div class="subtitle">Аяулы анамыздың мерейлі мерекесіне шақырамыз!</div>

<div class="section">

<h2>Құрметті қонақтар!</h2>

<div class="info">
Әулетіміздің берекесі, асыл анамыз <b>Шуғыланың</b>  
50 жас мерейтойының қадірлі қонағы болуға шақырамыз!
</div>

<div class="info">
📅 21 Наурыз 2026 жыл  
</div>

<div class="info">
🕖 Сағат 19:00
</div>

<div class="info">
📍 Шаян ауылы, "Қанат" тойханасы
</div>

<button class="button">Жұбайыммен бірге барамын</button>
<button class="button button2">Өзім барамын</button>

</div>

<div class="footer">
Алжановтар әулеті
</div>

</div>

</body>
</html>
