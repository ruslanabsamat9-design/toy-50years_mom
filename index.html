<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шұғыла 50 жас | Мерейтой</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:italic,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            /* Скриншоттағыдай алтын ұшқындары бар ақ фон */
            background-color: #ffffff;
            background-image: url('https://www.transparenttextures.com/patterns/white-diamond.png'), 
                              url('https://img.freepik.com/free-vector/luxury-white-background-with-golden-glitter_23-2148823133.jpg');
            background-size: cover;
            background-attachment: fixed;
            color: #1d3557;
            text-align: center;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: rgba(255, 255, 255, 0.8); /* Мәтін жақсы оқылуы үшін */
        }

        .header-img {
            width: 80px;
            margin-bottom: 20px;
        }

        .top-text {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.8rem;
            margin-bottom: 5px;
        }

        .main-name {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin: 10px 0;
            border-top: 1px solid #d4af37;
            border-bottom: 1px solid #d4af37;
            padding: 10px 0;
        }

        .invite-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #d4af37;
            margin-top: 40px;
            font-weight: 600;
        }

        .details {
            margin: 30px 0;
            font-size: 1.1rem;
            line-height: 2;
        }

        .btn-submit {
            display: inline-block;
            background-color: #1d3557;
            color: white;
            padding: 15px 60px;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.1rem;
            margin-top: 20px;
            transition: 0.3s;
        }

        .footer-text {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.4rem;
            margin-top: 50px;
            line-height: 1.4;
        }

        .venue-info {
            font-weight: bold;
            color: #d4af37;
        }
    </style>
</head>
<body>

    <div class="container" data-aos="fade-up">
        <img src="https://cdn-icons-png.flaticon.com/512/854/854878.png" alt="icon" class="header-img">

        <div class="top-text">Мерейтой иесі:</div>
        <div class="main-name">Шұғыла</div>

        <div class="invite-text">
            Тойға келуіңізді<br>растауыңызды сұраймыз!
        </div>

        <div class="details">
            📅 21.03.2026 ж. Сағат 19:00<br>
            📍 Шаян ауылы<br>
            <span class="venue-info">"Қанағат" тойханасы</span>
        </div>

        <a href="СЕНІҢ_ФОРМА_СІЛТЕМЕСІ" class="btn-submit">Жіберу</a>

        <div class="footer-text">
            Келіңіздер, тойымыздың қадірлі қонағы болыңыздар!<br>
            <br>
            <small style="font-size: 1rem; font-family: 'Montserrat'">Альжановтар әулеті</small>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1200 });
    </script>
</body>
</html>
