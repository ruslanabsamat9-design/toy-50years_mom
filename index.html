<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шұғыла анамыздың 50 жас мерейтойы</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    
    <style>
        body {
           background-image: url('фон.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Montserrat', sans-serif;
        }

        .invitation-card {
            background: rgba(255, 255, 255, 0.97);
            max-width: 480px;
            width: 100%;
            padding: 40px 30px;
            text-align: center;
            border: 2px solid #d4af37;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            border-radius: 8px;
        }

        .script-font {
            font-family: 'Great Vibes', cursive;
            color: #b8860b;
            font-size: clamp(45px, 10vw, 65px);
            margin: 10px 0;
        }

        .main-font {
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 12px;
            color: #666;
        }

        .title-50 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            color: #1a2a6c;
            font-style: italic;
            margin-bottom: 20px;
        }

        .divider {
            width: 50%;
            height: 1px;
            background: #d4af37;
            margin: 20px auto;
        }

        .intro-text {
            font-size: 15px;
            line-height: 1.6;
            color: #333;
            margin-bottom: 20px;
        }

        .calendar-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            margin: 15px 0;
        }

        .calendar-table th { color: #b8860b; padding-bottom: 8px; }
        
        .highlight {
            background-color: #b8860b;
            color: white;
            border-radius: 50%;
            display: inline-block;
            width: 28px;
            height: 28px;
            line-height: 28px;
            font-weight: 600;
        }

        .time-box {
            font-size: 18px;
            letter-spacing: 3px;
            color: #1a2a6c;
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
            padding: 10px 0;
            margin: 15px 0;
            font-weight: 600;
        }

        .location-box strong {
            display: block;
            font-size: 18px;
            color: #1a2a6c;
            margin-top: 5px;
        }

        .rsvp-section {
            background: #fdfaf5;
            padding: 20px;
            margin-top: 25px;
            border-radius: 5px;
        }

        .rsvp-section input {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .submit-btn {
            background: #1a2a6c;
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            text-transform: uppercase;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .submit-btn:hover { background: #b8860b; }

        .closing-text {
            font-family: 'Great Vibes', cursive;
            font-size: 30px;
            color: #1a2a6c;
            margin-top: 30px;
        }

        .family-footer {
            font-weight: 600;
            font-size: 14px;
            margin-top: 15px;
            color: #b8860b;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="invitation-card">
    <p class="main-font">Тойға шақыру</p>
    <div class="script-font">Шұғыла</div>
    <p class="title-50">50 жас мерейтойы</p>

    <div class="divider"></div>

    <p class="intro-text">
        Анамыз Шұғыланың 50 жас мерейтойының<br>
        қадірлі қонағы болыңыздар!
    </p>

    <div class="calendar-section">
        <table class="calendar-table">
            <thead>
                <tr>
                    <th>ДС</th> <th>СС</th> <th>СР</th> <th>БС</th> <th>ЖМ</th> <th>СБ</th> <th>ЖС</th>
                </tr>
            </thead>
            <tbody>
                <tr><td></td><td></td><td></td><td></td><td></td><td></td><td>1</td></tr>
                <tr><td>2</td><td>3</td><td>4</td><td>5</td><td>6</td><td>7</td><td>8</td></tr>
                <tr><td>9</td><td>10</td><td>11</td><td>12</td><td>13</td><td>14</td><td>15</td></tr>
                <tr><td>16</td><td>17</td><td>18</td><td>19</td><td>20</td><td class="highlight">21</td><td>22</td></tr>
                <tr><td>23</td><td>24</td><td>25</td><td>26</td><td>27</td><td>28</td><td>29</td></tr>
                <tr><td>30</td><td>31</td><td></td><td></td><td></td><td></td><td></td></tr>
            </tbody>
        </table>
        <div class="time-box">21.03.2026 • 19:00</div>
    </div>

    <div class="location-box">
        <p class="intro-text">
            Шаян ауылы,<br>
            <strong>«ҚАНАҒАТ» тойханасы</strong>
        </p>
    </div>

    <div class="rsvp-section">
        <form>
            <input type="text" placeholder="Есіміңізді жазыңыз..." required>
            <button type="submit" class="submit-btn">Растау</button>
        </form>
    </div>

    <div class="closing-text">
        Келіңіздер, тойымыздың қонағы болыңыздар!
    </div>

    <p class="family-footer">Альжановтар әулеті</p>
</div>

</body>
</html>
