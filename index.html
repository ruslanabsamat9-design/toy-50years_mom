<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Шұғыла Анамыздың 50 жас мерейтойы</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;400;600&family=Playfair+Display:italic,wght@0,700;1,700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        :root {
            --gold: #c5a059;
            --dark-gold: #8e6d2d;
            --bg: #fcfbf7;
        }

        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg);
            color: #333;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1530103862676-de8c9debad1d?auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            margin: 10px 0;
        }

        .age-badge {
            font-size: 1.2rem;
            border: 2px solid var(--gold);
            padding: 5px 25px;
            border-radius: 50px;
            margin-bottom: 20px;
        }

        .timer {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        .time-item {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 10px;
            border-radius: 10px;
            min-width: 65px;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .invitation-card {
            max-width: 600px;
            margin: -60px auto 40px;
            background: white;
            padding: 40px 25px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .invitation-card h2 {
            font-family: 'Dancing Script', cursive;
            font-size: 2.8rem;
            color: var(--gold);
            margin-bottom: 20px;
        }

        .divider {
            width: 80px;
            height: 2px;
            background: var(--gold);
            margin: 25px auto;
            opacity: 0.4;
        }

        .info-row {
            margin: 20px 0;
        }

        .info-row strong {
            display: block;
            color: var(--dark-gold);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.85rem;
            margin-bottom: 5px;
        }

        .rsvp-form {
            background: #fdfaf4;
            padding: 25px;
            border-radius: 15px;
            margin-top: 30px;
            border: 1px solid #eee;
        }

            width: 100%;
